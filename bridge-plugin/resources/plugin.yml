name: MuchuBridge
version: 1.3.0
main: com.muchucraft.bridge.MuchuBridgePlugin
api-version: '1.21'
depend: [Vault]
softdepend: [Essentials]
description: Localhost HTTP bridge exposing the Vault economy to the MuchuCraft gateway.
author: MuchuCraft
commands:
  deposit:
    description: Show the MUCHU deposit address for your bound wallet.
    usage: /<command>
  withdraw:
    description: Open the page to withdraw your in-game MUCHU to your wallet.
    usage: /<command>
